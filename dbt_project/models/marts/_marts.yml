version: 2

models:
  - name: fct_region_insights
    description: "One row per region per day. Contains aggregated
                  podcast chart metrics per country including content
                  mix, listening profile, and population context.
                  Primary mart for regional and geographic analysis."
    columns:
      - name: region_code
        tests:
          - not_null
      - name: snapshot_date
        tests:
          - not_null
      - name: total_shows
        tests:
          - not_null
      - name: pct_audio
        tests:
          - not_null

  - name: fct_show_insights
    description: "One row per show — lifetime performance summary
                  across all regions and dates. Used for global show
                  rankings, reach analysis and market size analysis."
    columns:
      - name: show_name
        tests:
          - not_null
      - name: show_publisher
        tests:
          - not_null
      - name: regions_present
        tests:
          - not_null
      - name: best_rank_ever
        tests:
          - not_null
